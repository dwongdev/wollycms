name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npx --workspace=packages/admin svelte-kit sync
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > "$NPM_CONFIG_USERCONFIG"

      - name: Build server
        run: npm run build --workspace=packages/server

      - name: Publish @wollycms/server
        run: npm publish --workspace=packages/server --access public

      - name: Publish @wollycms/astro
        run: npm publish --workspace=packages/astro --access public

      - name: Publish create-wolly
        run: npm publish --workspace=packages/create-wolly --access public
