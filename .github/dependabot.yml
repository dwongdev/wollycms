version: 2
updates:
  # Root package
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      tiptap:
        patterns:
          - "@tiptap/*"
      typescript:
        patterns:
          - "typescript"
    labels:
      - "dependencies"

  # Server (Hono API)
  - package-ecosystem: "npm"
    directory: "/packages/server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      typescript:
        patterns:
          - "typescript"
    labels:
      - "dependencies"

  # Admin (SvelteKit)
  - package-ecosystem: "npm"
    directory: "/packages/admin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      tiptap:
        patterns:
          - "@tiptap/*"
      typescript:
        patterns:
          - "typescript"
      svelte:
        patterns:
          - "@sveltejs/*"
          - "svelte"
    labels:
      - "dependencies"

  # Astro integration package
  - package-ecosystem: "npm"
    directory: "/packages/astro"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  # create-wolly CLI
  - package-ecosystem: "npm"
    directory: "/packages/create-wolly"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  # Docs (Starlight)
  - package-ecosystem: "npm"
    directory: "/apps/docs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
    ignore:
      # Astro manages its own Vite version — don't upgrade independently
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
