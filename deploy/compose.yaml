services:
  wollycms:
    image: ghcr.io/wollycms/wollycms:latest
    ports:
      - 4321:4321
    environment:
      - NODE_ENV=production
      - PORT=4321
      - HOST=0.0.0.0
      - DATABASE_URL=sqlite:./data/wolly.db
      - MEDIA_STORAGE=local
      - MEDIA_DIR=./uploads
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - SITE_URL=${SITE_URL:-https://your-site.example.com}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:4321/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # Ensure volume dirs are writable by container user (UID 1000)
    # Run on host: sudo chown -R 1000:1000 /tank/appdata/wollycms/
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
