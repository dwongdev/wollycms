services:
  wollycms:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4321:4321"
      - "4323:4323"
    environment:
      - NODE_ENV=development
      - PORT=4321
      - HOST=0.0.0.0
      - DATABASE_URL=sqlite:./data/wolly.db
      - MEDIA_DIR=./uploads
      - JWT_SECRET=dev-secret-change-me
    volumes:
      - ./packages/server/src:/app/packages/server/src
      - ./packages/admin/src:/app/packages/admin/src
      - wolly-data:/app/data
      - wolly-uploads:/app/uploads
    restart: unless-stopped

volumes:
  wolly-data:
  wolly-uploads:
